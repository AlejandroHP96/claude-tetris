<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>

    <div class="theme-toggle-wrapper">
      <span class="theme-label">OSCURO</span>
      <label class="theme-toggle" for="theme-toggle">
        <input type="checkbox" id="theme-toggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="theme-label">CLARO</span>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="name-entry hidden">
          <p class="name-entry-label">¡Entraste al top 5! Ingresa tu nombre:</p>
          <div class="name-entry-row">
            <input type="text" id="player-name" class="player-name-input" maxlength="16" placeholder="Nombre" />
            <button id="save-score-btn" class="save-score-btn">Guardar</button>
          </div>
        </div>

        <div id="records-section" class="records-section hidden">
          <div class="records-header">
            <span class="records-title">RECORDS</span>
            <button id="reset-records-btn" class="reset-records-btn">Resetear</button>
          </div>
          <div id="records-stats" class="records-stats"></div>
          <table id="records-table" class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
