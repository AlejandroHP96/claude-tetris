<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>

    <div class="theme-toggle-wrapper">
      <span class="theme-label">OSCURO</span>
      <label class="theme-toggle" for="theme-toggle">
        <input type="checkbox" id="theme-toggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="theme-label">CLARO</span>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <div class="skin-selector">
            <button class="skin-btn" data-skin="retro" onclick="setSkin('retro')">Retro</button>
            <button class="skin-btn" data-skin="neon" onclick="setSkin('neon')">Neon</button>
            <button class="skin-btn" data-skin="pastel" onclick="setSkin('pastel')">Pastel</button>
            <button class="skin-btn" data-skin="pixelart" onclick="setSkin('pixelart')">Pixel</button>
          </div>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box pause-box">
        <p class="pause-title">PAUSA</p>

        <button id="resume-btn" class="pause-btn pause-btn--primary">Reanudar</button>
        <button id="pause-restart-btn" class="pause-btn">Reiniciar</button>

        <div class="pause-level-row">
          <span class="pause-level-label">Nivel inicial</span>
          <div class="pause-level-controls">
            <button id="level-dec" class="level-step-btn" aria-label="Reducir nivel">−</button>
            <span id="start-level-display" class="start-level-display">1</span>
            <button id="level-inc" class="level-step-btn" aria-label="Aumentar nivel">+</button>
          </div>
        </div>

        <button id="toggle-controls-btn" class="pause-btn pause-btn--ghost">Ver controles</button>
        <div id="pause-controls" class="pause-controls-list hidden">
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
